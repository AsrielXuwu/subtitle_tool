name: Subtitle Tool Build and Release

on:
  push:
    # 只有推送以 v 开头的标签（如 v1.0.1）时才触发 Release
    tags:
      - 'v*'
  workflow_dispatch: # 保留手动触发按钮

permissions:
  contents: write # 必须赋予写入权限，否则 Actions 无法创建 Release

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: SubtitleTool-Windows
          - os: macos-latest
            artifact_name: SubtitleTool-macOS

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install pyinstaller pandas openpyxl

    # 打包逻辑（保持不变）
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onefile --name "SubtitleToolbox" subtitle_tool.pyw

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: pyinstaller --windowed --name "SubtitleToolbox" subtitle_tool.pyw

    # 压缩成品，方便发布
    - name: Zip Artifacts
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          zip -j SubtitleTool-Win.zip dist/SubtitleToolbox.exe
        else
          zip -r SubtitleTool-Mac.zip dist/SubtitleToolbox.app
        fi

    # 核心步骤：发布到 Release
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        # 指定要上传的文件
        files: |
          SubtitleTool-Win.zip
          SubtitleTool-Mac.zip
        # 自动根据 Commit 生成更新日志
        generate_release_notes: true