name: Subtitle Tool Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # 同时在 Windows 和 macOS 虚拟机上运行
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: SubtitleTool-Windows
            output_name: SubtitleToolbox.exe
          - os: macos-latest
            artifact_name: SubtitleTool-macOS
            output_name: SubtitleToolbox.app

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl

    # 根据不同平台执行不同的 PyInstaller 打包指令
    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # --noconsole 隐藏黑窗口，--onefile 打包为单文件
        pyinstaller --noconsole --onefile --name "SubtitleToolbox" subtitle_tool.pyw

    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # --windowed 打包为 macOS 标准的 .app 格式
        pyinstaller --windowed --name "SubtitleToolbox" subtitle_tool.pyw

    # 整理成品文件夹
    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p release_dist
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          cp dist/SubtitleToolbox.exe release_dist/
        else
          # macOS 打包出的 .app 其实是一个文件夹，需要整体拷贝
          cp -r dist/SubtitleToolbox.app release_dist/
        fi

    # 上传至 GitHub 界面供下载
    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release_dist/