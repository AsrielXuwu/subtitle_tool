name: Subtitle Tool Build

on:
  # 允许在 GitHub 网页端手动点击运行
  workflow_dispatch: 
  # 当推送 v 开头的 tag 时自动触发 Release (例如: git tag v1.0.0 && git push origin v1.0.0)
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            artifact_name: SubtitleTool-Windows-x64.exe
            asset_name: SubtitleTool-Windows-x64.exe
          # macOS Intel (x86_64)
          - os: macos-13
            artifact_name: SubtitleTool-macOS-Intel.zip
            asset_name: SubtitleTool-macOS-Intel.zip
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            artifact_name: SubtitleTool-macOS-AppleSilicon.zip
            asset_name: SubtitleTool-macOS-AppleSilicon.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 3.11 对各库兼容性最佳

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 包含了你代码中引用的所有库，以及 pandas 读写 excel 必须的 openpyxl
          pip install pyinstaller pandas openpyxl opencv-python pillow

      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name SubtitleTool subtitle_tool.pyw
          Move-Item dist\SubtitleTool.exe dist\${{ matrix.asset_name }}

      - name: Build Executable (macOS)
        if: runner.os == 'macOS'
        run: |
          # Mac 下 windowed 参数会自动生成 .app 应用程序包
          pyinstaller --noconfirm --windowed --name SubtitleTool subtitle_tool.pyw
          cd dist
          # 压缩 .app 防止下载后权限丢失导致 "文件已损坏" 报错
          zip -r ${{ matrix.asset_name }} SubtitleTool.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

      - name: Create GitHub Release
        # 仅当触发条件是推送 tag 时才自动创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true