name: Subtitle Tool Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # 增加 macos-13 (Intel x86_64) 和 macos-14 (Apple Silicon ARM64)
        os: [windows-latest, macos-15-intel, macos-14]
        include:
          - os: windows-latest
            artifact_name: SubtitleTool-Windows
            output_name: SubtitleToolbox.exe
          - os: macos-15-intel
            artifact_name: SubtitleTool-macOS-Intel
            output_name: SubtitleToolbox.app
          - os: macos-14
            artifact_name: SubtitleTool-macOS-AppleSilicon
            output_name: SubtitleToolbox.app

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl

    # Windows 的打包指令保持不变
    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # --noconsole 隐藏黑窗口，--onefile 打包为单文件
        pyinstaller --noconsole --onefile --name "SubtitleToolbox" subtitle_tool.pyw

    # macOS 打包指令：使用 startsWith 适配所有 macos 开头的系统
    - name: Build with PyInstaller (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        # --windowed 打包为 macOS 标准的 .app 格式
        pyinstaller --windowed --name "SubtitleToolbox" subtitle_tool.pyw

    # 整理成品文件夹
    - name: Prepare Artifacts
      shell: bash
      run: |
        mkdir -p release_dist
        # 判断如果是 windows 开头，则拷贝 exe；否则都按 macOS 的 .app 文件夹处理
        if [[ "${{ matrix.os }}" == windows* ]]; then
          cp dist/SubtitleToolbox.exe release_dist/
        else
          # macOS 打包出的 .app 其实是一个文件夹，需要整体拷贝
          cp -r dist/SubtitleToolbox.app release_dist/
        fi

    # 上传至 GitHub 界面供下载
    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release_dist/